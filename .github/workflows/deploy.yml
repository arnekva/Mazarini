name: Build and push Docker image

# On every push to master, build the bot image and push it to GitHub Container Registry (ghcr.io).
# The server's Watchtower then pulls it and deploys — gated by the /restart-check endpoint so active
# games are never interrupted. The heavy native compile runs here on GitHub's runners, not the 1-core VM.

on:
    push:
        branches: [master]

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - name: Notify Discord — new changes detected
              env:
                  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
                  COMMIT_MSG: ${{ github.event.head_commit.message }}
              run: |
                  [ -z "$DISCORD_WEBHOOK" ] && exit 0
                  msg="🔍 Nye endringer oppdaget på \`master\` av *${GITHUB_ACTOR}* (\`${GITHUB_SHA:0:8}\`): ${COMMIT_MSG}"
                  payload=$(jq -n --arg c "$msg" '{content:$c}')
                  curl -s -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK" || true

            - name: Checkout (full history so the startup commit-log works)
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Notify Discord — build started
              env:
                  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
              run: |
                  [ -z "$DISCORD_WEBHOOK" ] && exit 0
                  msg="🔨 Bygger ny image for \`${GITHUB_SHA:0:8}\` ..."
                  payload=$(jq -n --arg c "$msg" '{content:$c}')
                  curl -s -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK" || true

            - name: Build and push (linux/amd64)
              uses: docker/build-push-action@v6
              with:
                  context: .
                  platforms: linux/amd64
                  push: true
                  tags: |
                      ghcr.io/arnekva/mazarini:latest
                      ghcr.io/arnekva/mazarini:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Notify Discord — image pushed
              if: success()
              env:
                  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
              run: |
                  [ -z "$DISCORD_WEBHOOK" ] && exit 0
                  msg="📦 Build ferdig — image pushet til ghcr (\`${GITHUB_SHA:0:8}\`). Watchtower ruller ut så snart ingen spill er aktive."
                  payload=$(jq -n --arg c "$msg" '{content:$c}')
                  curl -s -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK" || true

            - name: Trigger Watchtower update
              if: success()
              env:
                  ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
                  WATCHTOWER_TOKEN: ${{ secrets.WATCHTOWER_TOKEN }}
              run: |
                  mkdir -p ~/.ssh
                  echo "$ORACLE_SSH_KEY" > ~/.ssh/oracle_key
                  chmod 600 ~/.ssh/oracle_key
                  ssh -i ~/.ssh/oracle_key -o StrictHostKeyChecking=no ubuntu@79.76.57.158 \
                    "curl -s -f -H 'Authorization: Bearer $WATCHTOWER_TOKEN' http://localhost:8080/v1/update"

            - name: Notify Discord — build failed
              if: failure()
              env:
                  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
              run: |
                  [ -z "$DISCORD_WEBHOOK" ] && exit 0
                  msg="❌ Build FEILET for \`${GITHUB_SHA:0:8}\` — ingen deploy. Sjekk GitHub Actions."
                  payload=$(jq -n --arg c "$msg" '{content:$c}')
                  curl -s -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK" || true
